<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tech Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#07111F;
    color:#fff;
    overflow:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top right,#5B5EFF33,transparent 40%),
        radial-gradient(circle at bottom left,#00C6FF22,transparent 40%);
    z-index:-1;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.hero{
    min-height:100vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:60px;
}

.hero-text h1{
    font-size:3.8rem;
    line-height:1.15;
    margin-bottom:25px;
}

.hero-text h1 span{
    color:#6B6EFF;
}

.hero-text p{
    color:#cfd8e3;
    line-height:1.8;
    font-size:1.05rem;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:20px;
}

.btn{
    display:inline-block;
    padding:16px 36px;
    border-radius:10px;
    text-decoration:none;
    font-weight:700;
    transition:.3s;
}

.primary{
    background:#5B5EFF;
    color:#fff;
}

.primary:hover{
    background:#7477ff;
}

.secondary{
    border:2px solid #5B5EFF;
    color:#fff;
}

.secondary:hover{
    background:#5B5EFF;
}

.images{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.images img{
    width:100%;
    border-radius:18px;
    object-fit:cover;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.images img:first-child{
    margin-top:50px;
}

@media(max-width:900px){

.hero{
    grid-template-columns:1fr;
    text-align:center;
    padding:50px 0;
}

.hero-text h1{
    font-size:2.7rem;
}

.buttons{
    justify-content:center;
}

.images img:first-child{
    margin-top:0;
}

}
</style>

</head>
<body>

<div class="container">

<section class="hero">

<div class="hero-text">

<h1>
Power Your <span>AI Innovation</span>
</h1>

<p>
Accelerate AI development with enterprise GPU infrastructure, intelligent AI solutions, and scalable cloud technology built for modern businesses.
</p>

<div class="buttons">
    <a href="#" class="btn primary">CTA1</a>
    <a href="#" class="btn secondary">CTA2</a>
</div>

</div>

<div class="images">
    <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=700&auto=format&fit=crop&q=80" alt="AI Technology">
    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=700&auto=format&fit=crop&q=80" alt="Cloud Computing">
</div>

</section>

</div>

</body>
</html>
