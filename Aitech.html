<meta charset="UTF-8">

<title>AI Tech Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#07111F;
    color:#fff;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top right,#5B5EFF33,transparent 40%),
        radial-gradient(circle at bottom left,#00C6FF22,transparent 40%);
    z-index:-1;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.hero{
    min-height:100vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:60px;
}

.hero-text h1{
    font-size:56px;
    line-height:1.2;
    margin-bottom:20px;
}

.hero-text h1 span{
    color:#6B6EFF;
}

.hero-text p{
    color:#cfd8e3;
    font-size:18px;
    line-height:1.8;
    margin-bottom:35px;
}

.buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    display:inline-block;
    padding:16px 40px;
    border-radius:10px;
    text-decoration:none;
    font-size:17px;
    font-weight:bold;
    transition:.3s;
}

.primary{
    background:#5B5EFF;
    color:#fff;
    border:2px solid #5B5EFF;
}

.primary:hover{
    background:#7477ff;
}

.secondary{
    background:transparent;
    color:#fff;
    border:2px solid #5B5EFF;
}

.secondary:hover{
    background:#5B5EFF;
}

.images{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.images img{
    width:100%;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.images img:first-child{
    margin-top:50px;
}

@media(max-width:900px){

.hero{
    grid-template-columns:1fr;
    text-align:center;
    padding:60px 0;
}

.hero-text h1{
    font-size:40px;
}

.buttons{
    justify-content:center;
}

.images{
    margin-top:40px;
}

.images img:first-child{
    margin-top:0;
}

}
</style>

</head>
<body>

<div class="container">

<section class="hero">

<div class="hero-text">

<h1>
Power Your <span>AI Innovation</span>
</h1>

<p>
Accelerate AI development with enterprise GPU infrastructure, intelligent AI solutions, and scalable cloud technology built for modern businesses.
</p>

</div>

<div class="images">

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=700&auto=format&fit=crop&q=80" alt="AI Image 2">

</div>

</section>

</div>

</body>
</html>
