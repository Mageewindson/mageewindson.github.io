<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tech Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#07111F;
    color:#fff;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top right,#5B5EFF30,transparent 40%),
        radial-gradient(circle at bottom left,#00C6FF25,transparent 40%);
    z-index:-1;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.hero{
    min-height:100vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:70px;
}

.hero-text h4{
    color:#7C8CFF;
    font-weight:600;
    margin-bottom:20px;
    letter-spacing:1px;
    text-transform:uppercase;
}

.hero-text h1{
    font-size:3.8rem;
    line-height:1.15;
    margin-bottom:25px;
}

.hero-text span{
    color:#6B6EFF;
}

.hero-text p{
    color:#C9D0DA;
    line-height:1.8;
    font-size:1.08rem;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    padding:16px 34px;
    border-radius:10px;
    text-decoration:none;
    font-weight:700;
    transition:.3s;
}

.primary{
    background:#5B5EFF;
    color:white;
}

.primary:hover{
    transform:translateY(-3px);
    background:#7376ff;
}

.secondary{
    border:2px solid #5B5EFF;
    color:white;
}

.secondary:hover{
    background:#5B5EFF;
}

.images{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.images img{
    width:100%;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    transition:.4s;
}

.images img:hover{
    transform:translateY(-8px);
}

.images img:first-child{
    margin-top:50px;
}

@media(max-width:900px){

.hero{
grid-template-columns:1fr;
padding:60px 0;
text-align:center;
}

.hero-text h1{
font-size:2.8rem;
}

.buttons{
justify-content:center;
}

.images{
margin-top:20px;
}

.images img:first-child{
margin-top:0;
}

}
</style>
</head>

<body>

<div class="container">

<section class="hero">

<div class="hero-text">

<h4>Enterprise AI Infrastructure</h4>

<h1>
Power Your <span>AI Innovation</span> with Next-Generation GPU Cloud
</h1>

<p>
Accelerate AI development with enterprise GPU infrastructure, intelligent AI agents, secure cloud deployment, and scalable compute designed for modern businesses.
</p>

<div class="buttons">
<a href="#" class="btn primary">🚀 Get Started</a>
<a href="#" class="btn secondary">📅 Book a Demo</a>
</div>

</div>

<div class="images">

<img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=700&auto=format&fit=crop&q=80" alt="Artificial Intelligence">

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=700&auto=format&fit=crop&q=80" alt="Cloud Computing">

</div>

</section>

</div>

</body>
</html>
